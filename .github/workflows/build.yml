name: Build Driver

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - '*.cpp'
      - '*.h'
      - '*.vcxproj'
      - '*.sln'
      - '*.inf'
      - '.github/**'

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Driver
        shell: cmd
        run: |
          msbuild MouClassInputInjection.vcxproj ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:OutDir=./bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouClassInputInjection.sys
          path: bin/MouClassInputInjection.sys
          retention-days: 30

      - name: Commit binary to release branch
        shell: pwsh
        run: |
          $sysPath = "bin/MouClassInputInjection.sys"
          if (!(Test-Path $sysPath)) {
            Write-Error "Driver binary not found at $sysPath"
            exit 1
          }
          
          # Copy to temp location so it's not lost during branch switch
          Copy-Item $sysPath "MouClassInputInjection.sys.tmp"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Try to get the release branch
          git fetch origin release --depth=1
          if ($LASTEXITCODE -eq 0) {
              git checkout release
              git reset --hard origin/release
          } else {
              git checkout --orphan release
              git rm -rf .
          }
          
          # Create bin directory if it doesn't exist
          if (!(Test-Path bin)) {
              New-Item -ItemType Directory bin
          }
          
          # Place the driver
          Move-Item "MouClassInputInjection.sys.tmp" "bin/MouClassInputInjection.sys" -Force
          
          git add bin/MouClassInputInjection.sys
          git commit -m "chore: add pre-built driver binary [skip ci]"
          git push -f origin release
